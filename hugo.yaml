        title: "Dr. Benjamin Kausch"
        subtitle: "Psychotherapie & Beratung"
        content: "Schön, dass Sie hier sind. Wir alle erleben Phasen der Unsicherheit, des Zweifels oder des inneren Wandels – Momente, in denen wir nicht weiterzukommen scheinen. Als staatlich approbierter Psychologischer Psychotherapeut (Kognitive Verhaltenstherapie) in Frankfurt biete ich Ihnen einen geschützten Raum, um solchen Herausforderungen mit mehr Klarheit und einer neuen Perspektive zu begegnen."
