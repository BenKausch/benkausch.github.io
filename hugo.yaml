      about:
        enable: true
        title: "Über mich"
        content: |-
          Mein Name ist Benjamin Kausch, und ich bin approbierter Psychologischer Psychotherapeut. Ich biete Ihnen Psychotherapie auf Deutsch und Englisch (private Krankenversicherung/PKV und Selbstzahler) sowie Coaching und Beratung – im Frankfurter Nordend und online.

          Meine Arbeit stützt sich auf wissenschaftlich fundierte Methoden der Kognitiven Verhaltenstherapie, ergänzt durch existenzielle und philosophische Perspektiven und einen aufmerksamen Blick auf Ihre persönliche Lebensgeschichte. Dabei geht es mir um mehr als rasche Lösungen: Mein Ziel ist es, gemeinsam mit Ihnen nachhaltige Wege zu mehr Selbstbestimmung, Klarheit und einem Leben zu finden, das sich für Sie stimmig anfühlt.

          Ob Sie in einer akuten Krise Unterstützung suchen, sich mit tieferen Lebensfragen beschäftigen oder einfach Raum zum Wachsen wünschen – ich begleite Sie mit Fachwissen, echter Empathie und einem praktischen, lösungsorientierten Blick.

          Wenn Sie das anspricht, lade ich Sie herzlich zu einem unverbindlichen Erstgespräch ein. Ich freue mich darauf, Sie kennenzulernen.

        skills:
          enable: true
          title: "Meine therapeutischen Schwerpunkte beinhalten:"
          items:
            - "Depressionen"
            - "Soziale Phobie"
            - "Panikattacken"
            - "Generalisierte Angststörung"
            - "Psychosomatische Störungen"
            - "Beziehungsprobleme"
            - "Posttraumatische Belastungsstörung (PTBS)"
            - "ADHS (Diagnostik und Behandlung)"
            - "Spezifische Phobien (Spinnen, Höhe, Tunnel, Fahrstühle, Fliegen, Hunde, Gewitter etc.)"

      achievements:
        enable: true
        title: "Therapeutische Ansätze"
        items:
          - title: Kognitive Verhaltenstherapie
            content: In der kognitiven Therapie erkunden wir Ihre Erfahrungen und Überzeugungen gemeinsam – im Geist eines neugierigen, behutsam begleiteten Entdeckens. Sie beginnen, Überzeugungen zu hinterfragen, die Sie seit früher Zeit in sich tragen, und entwickeln nach und nach einen freundlicheren, hilfreicheren Blick auf sich und die Welt. Durch konkrete, schrittweise Übungen gewinnen Sie Sicherheit in Verhaltensweisen, die Ihnen bislang schwergefallen sind.
          - title: Akzeptanz- und Commitmenttherapie (ACT)
            content: Die ACT hilft Ihnen, schwierigen Gedanken und Gefühlen Raum zu geben, statt gegen sie anzukämpfen. Durch Achtsamkeit, wertorientiertes Handeln und mehr psychische Flexibilität können Sie auch dann ein erfülltes Leben gestalten, wenn Herausforderungen bestehen bleiben. Es geht nicht darum, belastende Gedanken zum Schweigen zu bringen, sondern ihren Einfluss zu lockern – damit Sie Ihre Kraft dem widmen können, was Ihnen wirklich wichtig ist.
          - title: Existentielle Psychotherapie
            content: Die existenzielle Arbeit widmet sich den tiefen Fragen, die uns alle betreffen – Freiheit, Verantwortung, Vergänglichkeit und Sinn. Statt Probleme einfach beseitigen zu wollen, wenden wir uns diesen Themen offen zu und finden Ihren persönlichen Weg, mit ihnen zu leben. Daraus entsteht für viele Menschen ein neues Gefühl von Klarheit, Selbstbestimmung und stiller Zufriedenheit.

