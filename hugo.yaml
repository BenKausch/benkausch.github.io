      about:
        enable: true
        title: "About me"
        content: |-
          My name is Benjamin Kausch, and I'm a licensed Psychological Psychotherapist offering therapy in both English and German. I work with clients for psychotherapy (for those with private health insurance and those paying privately), as well as coaching and counselling — in Frankfurt's Nordend district and online.

          My work draws on evidence-based Cognitive Behavioural Therapy, enriched by existential and philosophical perspectives and a close attention to your own life story. I'm interested in more than quick fixes: my aim is to help you find lasting ways toward greater self-determination, clarity, and a life that feels genuinely your own.

          Whether you're facing an acute crisis, sitting with deeper questions about your life, or simply looking for room to grow, I'll work alongside you — with professional expertise, genuine empathy, and a practical, solution-focused approach.

          If any of this resonates, I warmly invite you to get in touch for an initial conversation, with no obligation. I look forward to meeting you.

        skills:
          enable: true
          title: "My therapeutic focus areas include:"
          items:
            - "Depression"
            - "Social Phobia"
            - "Panic Attacks"
            - "Generalized Anxiety Disorder"
            - "Psychosomatic Disorders"
            - "Relationship Problems"
            - "Post-Traumatic Stress Disorder (PTSD)"
            - "ADHD (Diagnosis and Treatment)"
            - "Specific Phobias (spiders, heights, tunnels, elevators, flying, dogs, thunderstorms, etc.)"

      achievements:
        enable: true
        title: "Therapeutic Approaches"
        items:
          - title: Cognitive Behavioural Therapy
            content: Through cognitive therapy, we explore your experiences and beliefs together in a spirit of curious, guided discovery. You begin to question convictions you've carried since early in life and to develop a kinder, more helpful view of yourself and the world. With practical, step-by-step exercises, you gradually build confidence in ways of acting that may have felt out of reach before.
          - title: Acceptance and Commitment Therapy (ACT)
            content: ACT helps you make room for difficult thoughts and feelings rather than struggling against them. Through mindfulness, values-led action, and greater psychological flexibility, you can build a meaningful life even when challenges remain. The aim isn't to silence painful thoughts, but to loosen their grip — so you can put your energy into what truly matters to you.
          - title: Existential Psychotherapy
            content: Existential work engages the deeper questions we all face — freedom, responsibility, mortality, and meaning. Rather than simply trying to make problems go away, we turn toward these themes openly and find your own way of living with them. From there, many people discover a renewed sense of clarity, agency, and quiet contentment.

